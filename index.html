<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit Tracker</title>
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent-green: #238636;
      --accent-green-hover: #2ea043;
      --danger: #da3633;
      --level-0: #161b22;
      --level-1: #0e4429;
      --level-2: #006d32;
      --level-3: #26a641;
      --level-4: #39d353;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .streak {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .streak-fire {
      font-size: 1.2rem;
    }

    .add-habit {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 1rem;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(35, 134, 54, 0.3);
    }

    button {
      padding: 0.75rem 1.5rem;
      background: var(--accent-green);
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--accent-green-hover);
    }

    .habits-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .habit-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem 1.25rem;
    }

    .habit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .habit-name {
      font-size: 1rem;
      font-weight: 500;
    }

    .habit-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-icon {
      padding: 0.4rem 0.6rem;
      font-size: 0.8rem;
      background: var(--bg-tertiary);
    }

    .btn-delete {
      background: var(--danger);
    }

    .btn-delete:hover {
      background: #f85149;
    }

    .contribution-grid {
      display: grid;
      grid-template-columns: repeat(52, 1fr);
      gap: 3px;
    }

    .contribution-cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: var(--level-0);
      transition: transform 0.1s;
    }

    .contribution-cell:hover {
      transform: scale(1.3);
    }

    .contribution-cell.level-1 { background: var(--level-1); }
    .contribution-cell.level-2 { background: var(--level-2); }
    .contribution-cell.level-3 { background: var(--level-3); }
    .contribution-cell.level-4 { background: var(--level-4); }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state p {
      margin-bottom: 1rem;
    }

    .stats {
      display: flex;
      gap: 2rem;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
    }

    .modal h2 {
      margin-bottom: 1rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .btn-cancel {
      background: var(--bg-tertiary);
    }

    .btn-cancel:hover {
      background: #30363d;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 Habit Tracker</h1>
      <div class="streak">
        <span class="streak-fire">🔥</span>
        <span id="totalStreak">0 day streak</span>
      </div>
    </header>

    <div class="add-habit">
      <input type="text" id="habitInput" placeholder="Enter a new habit...">
      <button onclick="addHabit()">Add Habit</button>
    </div>

    <div id="habitsContainer" class="habits-grid"></div>
  </div>

  <div id="deleteModal" class="modal-overlay">
    <div class="modal">
      <h2>Delete Habit?</h2>
      <p>This will permanently remove this habit and all its history.</p>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let habits = JSON.parse(localStorage.getItem('habits') || '[]');
    let habitToDelete = null;

    function save() {
      localStorage.setItem('habits', JSON.stringify(habits));
      render();
      updateStreak();
    }

    function addHabit() {
      const input = document.getElementById('habitInput');
      const name = input.value.trim();
      if (!name) return;

      const today = new Date().toISOString().split('T')[0];
      habits.push({
        id: Date.now(),
        name,
        created: today,
        completions: {}
      });
      input.value = '';
      save();
    }

    function deleteHabit(id) {
      habitToDelete = id;
      document.getElementById('deleteModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('deleteModal').classList.remove('active');
      habitToDelete = null;
    }

    function confirmDelete() {
      habits = habits.filter(h => h.id !== habitToDelete);
      closeModal();
      save();
    }

    function toggleCompletion(id) {
      const habit = habits.find(h => h.id === id);
      const today = new Date().toISOString().split('T')[0];
      
      if (habit.completions[today]) {
        delete habit.completions[today];
      } else {
        habit.completions[today] = true;
      }
      save();
    }

    function getLast365Days() {
      const days = [];
      for (let i = 364; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        days.push(d.toISOString().split('T')[0]);
      }
      return days;
    }

    function getStreak(completions) {
      let streak = 0;
      const today = new Date();
      
      for (let i = 0; i < 365; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        
        if (completions[dateStr]) {
          streak++;
        } else if (i > 0) {
          break;
        }
      }
      return streak;
    }

    function updateStreak() {
      let maxStreak = 0;
      habits.forEach(h => {
        const streak = getStreak(h.completions);
        if (streak > maxStreak) maxStreak = streak;
      });
      document.getElementById('totalStreak').textContent = 
        `${maxStreak} day${maxStreak !== 1 ? 's' : ''} streak`;
    }

    function renderGrid(habit) {
      const days = getLast365Days();
      const today = new Date().toISOString().split('T')[0];
      
      // Find level for each day
      let levelCounts = [0, 0, 0, 0, 0];
      
      const cells = days.map(date => {
        const completed = habit.completions[date] ? 1 : 0;
        let level = 0;
        if (completed) {
          // Simple: 1 completion = level 2 for visibility
          level = 2;
        }
        levelCounts[level]++;
        return `<div class="contribution-cell ${level > 0 ? 'level-' + level : ''}" title="${date}: ${completed ? '✓' : '✗'}"></div>`;
      }).join('');

      return `
        <div class="contribution-grid">${cells}</div>
        <div class="stats">
          <span>${levelCounts[0]} days remaining</span>
          <span>${levelCounts[1] + levelCounts[2] + levelCounts[3] + levelCounts[4]} days completed</span>
        </div>
      `;
    }

    function render() {
      const container = document.getElementById('habitsContainer');
      
      if (habits.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No habits yet. Add your first habit above!</p>
          </div>
        `;
        return;
      }

      const today = new Date().toISOString().split('T')[0];
      
      container.innerHTML = habits.map(habit => {
        const completed = habit.completions[today];
        const streak = getStreak(habit.completions);
        
        return `
          <div class="habit-card">
            <div class="habit-header">
              <span class="habit-name">
                ${completed ? '✅' : '⬜'} ${habit.name}
                <span style="color: var(--text-secondary); font-size: 0.85rem; margin-left: 0.5rem;">
                  🔥 ${streak}
                </span>
              </span>
              <div class="habit-actions">
                <button class="btn-icon" onclick="toggleCompletion(${habit.id})">
                  ${completed ? 'Undo' : 'Done'}
                </button>
                <button class="btn-icon btn-delete" onclick="deleteHabit(${habit.id})">
                  Delete
                </button>
              </div>
            </div>
            ${renderGrid(habit)}
          </div>
        `;
      }).join('');
    }

    // Handle Enter key
    document.getElementById('habitInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addHabit();
    });

    render();
    updateStreak();
  </script>
</body>
</html>
